name: Build TWA (Android APK/AAB)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Create TWA build directory
        run: mkdir -p twa-build

      - name: Write twa-manifest.json
        working-directory: twa-build
        run: |
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "com.jhscadvisor.app",
            "host": "jhscadvisor.com",
            "name": "JHSC Advisor",
            "launcherName": "JHSC Advisor",
            "display": "standalone",
            "themeColor": "#1e3a5f",
            "navigationColor": "#1e3a5f",
            "navigationColorDark": "#1e3a5f",
            "navigationDividerColor": "#1e3a5f",
            "navigationDividerColorDark": "#1e3a5f",
            "backgroundColor": "#ffffff",
            "startUrl": "/",
            "iconUrl": "https://jhscadvisor.com/icon-512.png",
            "maskableIconUrl": "https://jhscadvisor.com/icon-512.png",
            "monochromeIconUrl": "https://jhscadvisor.com/icon-512.png",
            "splashScreenFadeOutDuration": 300,
            "webManifestUrl": "https://jhscadvisor.com/manifest.json",
            "fullScopeUrl": "https://jhscadvisor.com/",
            "appVersion": "1",
            "appVersionCode": 1,
            "signingMode": "none",
            "generatorApp": "bubblewrap-cli",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": { "enabled": false },
            "enableNotifications": false,
            "shortcuts": [],
            "orientation": "portrait",
            "fingerprints": [],
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "minSdkVersion": 19,
            "targetSdkVersion": 34
          }
          EOF

      - name: Build TWA
        working-directory: twa-build
        run: bubblewrap build --skipPwaValidation
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: List build outputs
        working-directory: twa-build
        run: find . -name "*.apk" -o -name "*.aab" | sort

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jhsc-advisor-apk
          path: twa-build/**/*.apk
          if-no-files-found: warn

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: jhsc-advisor-aab
          path: twa-build/**/*.aab
          if-no-files-found: warn
