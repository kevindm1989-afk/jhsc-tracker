name: Build TWA (Android APK/AAB)

on:
  workflow_dispatch:

env:
  ANDROID_HOME: ${{ github.workspace }}/android-sdk
  ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Android SDK cmdline-tools
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          curl -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install required SDK packages
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Pre-configure Bubblewrap (skip JDK/SDK prompts)
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF
          echo "Bubblewrap config written:"
          cat ~/.bubblewrap/config.json

      - name: Init TWA project from web manifest
        run: |
          bubblewrap init \
            --manifest=https://jhscadvisor.com/manifest.webmanifest \
            --directory=twa-project \
            --skipPwaValidation
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Override twa-manifest.json with pinned values
        working-directory: twa-project
        run: |
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "com.jhscadvisor.app",
            "host": "jhscadvisor.com",
            "name": "JHSC Advisor",
            "launcherName": "JHSC Advisor",
            "display": "standalone",
            "themeColor": "#1e3a5f",
            "navigationColor": "#1e3a5f",
            "navigationColorDark": "#1e3a5f",
            "navigationDividerColor": "#1e3a5f",
            "navigationDividerColorDark": "#1e3a5f",
            "backgroundColor": "#ffffff",
            "startUrl": "/",
            "iconUrl": "https://jhscadvisor.com/icon-512.png",
            "maskableIconUrl": "https://jhscadvisor.com/icon-512.png",
            "monochromeIconUrl": "https://jhscadvisor.com/icon-512.png",
            "splashScreenFadeOutDuration": 300,
            "webManifestUrl": "https://jhscadvisor.com/manifest.webmanifest",
            "fullScopeUrl": "https://jhscadvisor.com/",
            "appVersion": "1.0.0",
            "appVersionCode": 1,
            "signingMode": "none",
            "generatorApp": "bubblewrap-cli",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": { "enabled": false },
            "enableNotifications": false,
            "shortcuts": [],
            "orientation": "portrait",
            "fingerprints": [],
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "minSdkVersion": 19,
            "targetSdkVersion": 34
          }
          EOF

      - name: Build TWA
        working-directory: twa-project
        run: bubblewrap build --skipPwaValidation
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: List build outputs
        working-directory: twa-project
        run: find . -name "*.apk" -o -name "*.aab" | sort

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jhsc-advisor-apk
          path: twa-project/app/build/outputs/**/*.apk
          if-no-files-found: warn

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: jhsc-advisor-aab
          path: twa-project/app/build/outputs/**/*.aab
          if-no-files-found: warn
