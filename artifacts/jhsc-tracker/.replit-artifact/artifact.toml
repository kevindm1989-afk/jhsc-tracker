kind = "web"
previewPath = "/"
title = "JHSC Tracker"
version = "1.0.0"
id = "artifacts/jhsc-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25745

[services.development]
run = "pnpm --filter @workspace/jhsc-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jhsc-tracker", "run", "build" ]
publicDir = "artifacts/jhsc-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25745"
BASE_PATH = "/"
