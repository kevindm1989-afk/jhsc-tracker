kind = "web"
previewPath = "/"
title = "JHSC Advisor"
version = "1.0.0"
id = "artifacts/jhsc-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25745

[services.development]
run = "pnpm --filter @workspace/jhsc-tracker run dev"

[services.production]
build = ["sh", "-c", "BASE_PATH=/ pnpm --filter @workspace/jhsc-tracker run build && pnpm --filter @workspace/api-server run build"]
run = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.js"]

[services.env]
PORT = "25745"
BASE_PATH = "/"

[services.production.env]
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
