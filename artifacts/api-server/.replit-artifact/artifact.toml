kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.env]
PORT = "8080"

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]
build = ["sh", "-c", "PORT=3000 BASE_PATH=/ pnpm --filter @workspace/jhsc-tracker run build && pnpm --filter @workspace/api-server run build"]
run = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.js"]

[services.production.env]
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/health"
